# yaml-language-server: $schema=https://raw.githubusercontent.com/lonic-software/pult/v0.4.0/pult.schema.json
# pult manifest — the operational commands for pult-desktop maintainers.
# Authoring guide: https://github.com/lonic-software/pult/blob/v0.4.0/docs/authoring.md
#
# Run `pult` for the guided menu, or `pult <id>` directly. Real logic lives
# in ./bin — these are one-liners that call it.
version: 1
name: pult-desktop

includes:
  # Surfaces the module's `install` here too, so `pult install` works for a
  # maintainer's own checkout and `pult x github.com/lonic-software/pult-desktop
  # install` works for everyone else, from one definition — the pattern
  # pult's own authoring guide recommends for "a command you also use
  # locally" (docs/authoring.md §3, "Exposing a command that you also use
  # locally"). pult.yaml and pult.module.yaml stay separate files on
  # purpose: this repo's internal commands (release, check, …) never leak
  # into what a stranger running `pult x` can see.
  - source: ./pult.module.yaml

commands:
  - id: dev
    title: Run (dev mode)
    category: Develop
    description: >-
      Starts the Tauri dev server (Vite + Tauri, hot reload). It blocks until
      you Ctrl+C, and pult-desktop has no pty runner yet (see README "Next
      steps"), so it can't run this in-app — run `pult dev` from a real
      terminal.
    check: "command -v npm && command -v cargo"
    interactive: true
    run: "npm run tauri dev"

  - id: mock
    title: Run the mock board
    category: Develop
    description: >-
      Serves the frontend alone in a browser at http://localhost:1420, backed
      by a scripted fake backend instead of the real Tauri shell — no pult
      binary or Tauri build needed. The demo runs cover a determinate
      progress bar with stages (aws:deploy), an indeterminate one (status), a
      run that fails (import), and a stoppable long-running one (test:smoke).
      Opens your browser automatically and blocks until you Ctrl+C.
    check: "command -v npm"
    interactive: true
    run: "VITE_MOCK=1 npm run dev -- --open"

  - id: mock-app
    title: Run the mock app
    category: Develop
    description: >-
      Same demo backend as `mock`, but inside the real Tauri desktop window
      instead of a browser — VITE_MOCK is read by the frontend at Vite dev
      time, so the app shell runs normally while the frontend uses the
      scripted fake backend. The same demo runs as `mock` (aws:deploy
      determinate+stages, status indeterminate, import failing, test:smoke
      stoppable). The first run compiles the Rust side, so the window takes
      longer to appear, and it blocks until you Ctrl+C.
    check: "command -v npm && command -v cargo"
    interactive: true
    run: "VITE_MOCK=1 npm run tauri dev"

  - id: build
    title: Build bundles
    category: Ship
    description: >-
      Builds the installer for this OS: dmg on macOS, NSIS on Windows, deb
      or AppImage on Linux.
    check: "command -v npm && command -v cargo"
    run: "npm run tauri build"

  - id: check
    title: Run checks
    category: Develop
    description: >-
      Runs svelte-check, the frontend build, cargo test, and clippy — exactly
      what `pult release` runs before it touches anything. Broader than CI
      (ci.yml splits frontend/rust into parallel jobs and skips cargo test)
      — this runs everything sequentially in one command.
    check: "command -v npm && command -v cargo"
    run: "./bin/check"

  - id: test
    title: Run tests
    category: Develop
    description: >-
      Fast loop over `cargo test`; forwards any extra args to it.
    check: "command -v cargo"
    run: "./bin/test"

  - id: release
    title: Release
    category: Ship
    description: >-
      Bumps the version everywhere (package.json, tauri.conf.json, and
      Cargo.toml/Cargo.lock), runs the check gate, then commits, tags, and
      pushes. CI then builds the installer matrix into a DRAFT GitHub
      release — publish it yourself when you're happy with it.
    check: "command -v git && command -v npm && command -v cargo"
    params:
      # next patch / minor / major from the latest v* tag; patch is the
      # picker's default (first line of bin/release-candidates' output)
      version: { pick: { from: "./bin/release-candidates" } }
    run: "./bin/release {version}"
