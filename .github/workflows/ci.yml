name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (check + build)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Type check (svelte-check)
        run: npm run check

      - name: Build frontend
        run: npm run build

  rust:
    name: Rust (clippy)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri 2)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            libxdo-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Fetch pult sidecar
        # `bundle.externalBin` makes tauri-build's build script check for
        # this resource on every `cargo build`/`check`/`clippy`/`test` of
        # the src-tauri crate, not just `tauri build` — see
        # scripts/fetch-pult-sidecar.mjs and the README's "Sidecar
        # bundling" section. The fetch script is Node-builtins-only (no
        # node_modules needed) and ubuntu-22.04 runners ship Node 20+
        # preinstalled, so no setup-node/npm ci step is needed here.
        # TAURI_ENV_TARGET_TRIPLE isn't set here (only the Tauri CLI's
        # beforeBuildCommand/beforeDevCommand hooks set it), so this falls
        # back to host detection, which matches this runner's default
        # build target anyway.
        run: node scripts/fetch-pult-sidecar.mjs

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
