version: 1
name: demo-repo
description: Fixture repo for pult-desktop's backend integration tests

includes:
  - source: ./mods/aws
    prefix: aws

# Named steps for `pipeline` below — a list-form `run:` compiles a guarded
# `step k/n <name>` emission before each one automatically (pult repo's
# docs/reference.md, "Events protocol" — "Compiled step lists emit `step`
# events automatically"), and each step here also emits an explicit
# `progress`/`status` line itself, guarded per the same doc's pattern
# (`[ -n "${PULT_EVENTS:-}" ] && … >&$PULT_EVENTS`) — exercising all three
# verbs (step, progress, status) from one fixture command.
steps:
  build-step: |
    [ -n "${PULT_EVENTS:-}" ] && echo "progress 50 building" >&$PULT_EVENTS
    echo "build output"
  release-step: |
    [ -n "${PULT_EVENTS:-}" ] && echo "status releasing now" >&$PULT_EVENTS
    echo "release output"

commands:
  - id: shell
    title: Open a shell
    params:
      env: { pick: { options: [dev, uat, pre] } }
    run: "echo shell in {env}"
    check: "command -v sh"
    interactive: true

  - id: status
    title: Show status
    run: "echo all good"
    check: "command -v sh"

  - id: import
    title: Import data
    category: Deploy
    params:
      token: { input: { secret: true } }
      note: { input: { default: "" } }
    check: "command -v this-tool-does-not-exist-xyz"
    run: "echo importing with token {token} note {note}"

  - id: pipeline
    title: Run pipeline
    run:
      - use: build-step
      - use: release-step
    check: "command -v sh"

  - id: sleep-loop
    title: Sleep loop
    run: "while true; do sleep 1; done"

  # A slow run that produces one real line of backlog before looping
  # forever — used by journal.rs's real-pult-binary restart e2e test (fix
  # round 2, point fix A) to prove a fresh tail_run call mid-run replays the
  # FULL backlog (not just whatever arrives after the restart), the actual
  # eject-remount recovery scenario against a real journaled run rather than
  # a hand-written fixture meta.json.
  - id: slow-drip
    title: Slow drip
    run: |
      echo "first drop"
      while true; do sleep 1; done
